name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: MacNTop
  BUNDLE_ID: com.corvidlabs.macntop
  SIGNING_IDENTITY: "Developer ID Application: Zach Eriksen (8M8SAX62V2)"
  NOTARIZE_PROFILE: "GitHub-Mac-Notarize"

jobs:
  build-and-release:
    name: Build, Sign & Notarize
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Release
        run: swift build -c release

      - name: Create App Bundle
        run: |
          # Clean and create bundle structure
          rm -rf "${{ env.APP_NAME }}.app"
          mkdir -p "${{ env.APP_NAME }}.app/Contents/MacOS"
          mkdir -p "${{ env.APP_NAME }}.app/Contents/Resources"

          # Copy executable
          cp .build/release/${{ env.APP_NAME }} "${{ env.APP_NAME }}.app/Contents/MacOS/"

          # Create Info.plist
          cat > "${{ env.APP_NAME }}.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>MacNTop</string>
              <key>CFBundleIdentifier</key>
              <string>com.corvidlabs.macntop</string>
              <key>CFBundleName</key>
              <string>MacNTop</string>
              <key>CFBundleDisplayName</key>
              <string>MacNTop</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2026 CorvidLabs. MIT License.</string>
          </dict>
          </plist>
          PLIST

      - name: Sign App Bundle
        run: |
          codesign --force --options runtime \
            --sign "${{ env.SIGNING_IDENTITY }}" \
            --timestamp \
            "${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"

          codesign --force --options runtime \
            --sign "${{ env.SIGNING_IDENTITY }}" \
            --timestamp \
            "${{ env.APP_NAME }}.app"

          # Verify signature
          codesign --verify --verbose "${{ env.APP_NAME }}.app"

      - name: Create ZIP for Notarization
        run: |
          ditto -c -k --keepParent "${{ env.APP_NAME }}.app" "${{ env.APP_NAME }}.zip"

      - name: Notarize App
        id: notarize
        timeout-minutes: 15
        run: |
          # Use shell timeout as safety net (14 minutes = 840 seconds)
          timeout 840 xcrun notarytool submit "${{ env.APP_NAME }}.zip" \
            --keychain-profile "${{ env.NOTARIZE_PROFILE }}" \
            --wait \
            --timeout 600 \
            --no-progress \
            2>&1 | tee notarization.log

          # Check if successful
          if grep -q "status: Accepted" notarization.log; then
            echo "Notarization successful"
          else
            echo "Notarization may have failed, checking status..."
            cat notarization.log
            exit 1
          fi

      - name: Staple Notarization Ticket
        if: steps.notarize.outcome == 'success'
        run: |
          xcrun stapler staple "${{ env.APP_NAME }}.app"

      - name: Create Distribution ZIP
        run: |
          rm "${{ env.APP_NAME }}.zip"
          ditto -c -k --keepParent "${{ env.APP_NAME }}.app" "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip"

      - name: Verify Final App
        run: |
          spctl --assess --verbose "${{ env.APP_NAME }}.app"
          codesign -dv --verbose=4 "${{ env.APP_NAME }}.app"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Manual Trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}
          path: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip
